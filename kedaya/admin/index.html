<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>Kedaya 邮箱验证码</title>
  </head>
  <body>
    <main class="shell compact-shell">
      <section class="hero centered-hero">
        <p class="eyebrow">Kedaya Mail Code</p>
        <h1>邮箱验证码</h1>
      </section>

      <section class="panel" aria-labelledby="queryLabel">
        <div class="panel-head minimal-head">
          <div>
            <h2 id="queryLabel">取码参数</h2>
          </div>
        </div>
        <div class="form-grid">
          <label>
            <span>邮箱</span>
            <input id="emailInput" autocomplete="off" spellcheck="false" placeholder="michaelalexander7182@outlook.com" />
          </label>
        </div>
        <div class="actions centered-actions">
          <button id="queryButton" class="primary" type="button">获取验证码</button>
          <button id="copyCodeButton" class="secondary" type="button" disabled>复制验证码</button>
          <button id="copyEmailButton" class="secondary" type="button" disabled>复制邮箱</button>
        </div>
        <div id="statusBox" class="status" role="status" aria-live="polite">等待输入邮箱。</div>
      </section>

      <section class="panel result-panel" aria-labelledby="codeLabel">
        <div class="panel-head minimal-head">
          <div>
            <h2 id="codeLabel">最新验证码</h2>
          </div>
        </div>
        <div id="codeBox" class="result-card is-empty">
          <div class="verification-code muted-code">------</div>
          <strong class="badge idle">等待</strong>
          <p class="muted">查询后显示最新一封邮件验证码。</p>
        </div>
      </section>

      <section id="rawPanel" class="panel" aria-labelledby="rawLabel" hidden>
        <div class="panel-head minimal-head">
          <div>
            <h2 id="rawLabel">原始返回</h2>
          </div>
        </div>
        <pre id="rawBox" class="json-output">{}</pre>
      </section>
    </main>
    <script type="module" src="/src/kedaya-admin.ts"></script>
  </body>
</html>
