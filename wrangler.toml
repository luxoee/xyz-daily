name = "xyz-daily"
compatibility_date = "2026-05-30"
pages_build_output_dir = "dist"

# Cloudflare Pages 生产环境需要绑定：
# 1. D1 database binding: xyz_daily_cards
# 2. Secret variable: CARD_ADMIN_TOKEN
#
# 创建和初始化示例：
# npx wrangler d1 create xyz-daily-cards
# npx wrangler d1 execute xyz-daily-cards --remote --file=./schema/cards.sql
# npx wrangler pages secret put CARD_ADMIN_TOKEN --project-name xyz-daily
#
# 如果使用 wrangler.toml 管理 D1 绑定，取消下方注释并填入真实 database_id。
[[d1_databases]]
binding = "xyz_daily_cards"
database_name = "xyz-daily-cards"
database_id = "ca57c38e-c1c2-4d44-9c08-942e09fd05c7"
