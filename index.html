<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>邮箱验证码</title>
  </head>
  <body>
    <main id="app" class="shell compact-shell">
      <section class="hero centered-hero">
        <p class="eyebrow">Mail Code</p>
        <h1>邮箱验证码</h1>
      </section>

      <section class="panel" aria-labelledby="sessionLabel">
        <div class="panel-head minimal-head">
          <div>
            <h2 id="sessionLabel">取码状态</h2>
          </div>
        </div>
        <div id="sessionBox" class="session-grid"></div>
        <div class="actions centered-actions">
          <button id="refreshButton" class="primary" type="button" disabled>获取验证码</button>
          <button id="copyButton" class="secondary" type="button" disabled>复制验证码</button>
        </div>
        <div id="statusBox" class="status" role="status" aria-live="polite">正在解析访问链接...</div>
      </section>

      <section class="panel result-panel" aria-labelledby="resultLabel">
        <div class="panel-head minimal-head">
          <div>
            <h2 id="resultLabel">验证码</h2>
          </div>
        </div>
        <div id="resultBox" class="result-card is-empty">等待获取验证码。</div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
