<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>生成取码链接</title>
  </head>
  <body>
    <main class="shell compact-shell">
      <section class="hero centered-hero">
        <p class="eyebrow">Link Generator</p>
        <h1>生成取码链接</h1>
      </section>

      <section class="panel" aria-labelledby="generatorLabel">
        <div class="panel-head minimal-head">
          <div>
            <h2 id="generatorLabel">链接参数</h2>
          </div>
        </div>
        <div class="form-grid">
          <label>
            <span>兑换码</span>
            <input id="codeInput" autocomplete="off" spellcheck="false" placeholder="这里输入兑换码" />
          </label>
        </div>
        <div class="actions centered-actions">
          <button id="generateButton" class="primary" type="button">生成链接</button>
          <button id="copyLinkButton" class="secondary" type="button" disabled>复制链接</button>
        </div>
        <div id="generatorStatus" class="status" role="status" aria-live="polite">等待输入参数。</div>
      </section>

      <section class="panel" aria-labelledby="linkLabel">
        <div class="panel-head minimal-head">
          <div>
            <h2 id="linkLabel">访问链接</h2>
          </div>
        </div>
        <textarea id="linkOutput" class="link-output" readonly placeholder="生成后显示加密链接"></textarea>
      </section>
    </main>
    <script type="module" src="/src/generator.ts"></script>
  </body>
</html>
